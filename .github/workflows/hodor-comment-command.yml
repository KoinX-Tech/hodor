name: Hodor Comment Command

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

concurrency:
  group: hodor-comment-${{ github.repository }}-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  parse:
    if: ${{ github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.parse.outputs.should_run }}
      prompt: ${{ steps.parse.outputs.prompt }}
      reason: ${{ steps.parse.outputs.reason }}
    steps:
      - name: Parse slash command and authorize actor
        id: parse
        uses: actions/github-script@v7
        env:
          HODOR_ALLOWED_ASSOCIATIONS: ${{ vars.HODOR_ALLOWED_ASSOCIATIONS }}
          # Comma-separated list of allowed PR base branches (target branches).
          # Defaults to `development`.
          HODOR_ALLOWED_BASE_BRANCH: ${{ vars.HODOR_ALLOWED_BASE_BRANCH || 'development' }}
        with:
          script: |
            const body = (context.payload.comment?.body || "").trim();
            const association = (context.payload.comment?.author_association || "").toUpperCase();
            const allowedRaw = (process.env.HODOR_ALLOWED_ASSOCIATIONS || "OWNER,MEMBER,COLLABORATOR")
              .split(",")
              .map((v) => v.trim().toUpperCase())
              .filter(Boolean);
            const allowed = new Set(allowedRaw);
            const starts = body.toLowerCase().startsWith("/hodor");
            if (!starts) {
              core.setOutput("should_run", "false");
              core.setOutput("prompt", "");
              core.setOutput("reason", "not_hodor_command");
              return;
            }

            const marker = `<!-- hodor-parse-failure:${context.payload.comment.id} -->`;
            const createParseFailureComment = async (commentBody) => {
              try {
                const existing = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  per_page: 100,
                });
                if ((existing.data || []).some((c) => c?.body?.includes(marker))) return;

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `${commentBody}\n\n${marker}`,
                });
              } catch (commentErr) {
                core.warning(`Failed to create parse-failure comment: ${commentErr?.message || commentErr}`);
              }
            };

            if (!allowed.has(association)) {
              core.setOutput("should_run", "false");
              core.setOutput("prompt", "");
              core.setOutput("reason", "unauthorized_actor");
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `@${context.actor} only repository members/collaborators can run Hodor.`,
              });
              return;
            }

            // Restrict to particular PR base branches (target branch).
            // In `issue_comment` events, `context.issue.number` is the PR number.
            const allowedBase = (process.env.HODOR_ALLOWED_BASE_BRANCH || "development")
              .split(",")
              .map((v) => v.trim())
              .filter(Boolean);
            try {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
              });
              const baseRef = pr.data?.base?.ref;
              if (!baseRef || !allowedBase.includes(baseRef)) {
                core.setOutput("should_run", "false");
                core.setOutput("prompt", "");
                core.setOutput(
                  "reason",
                  `wrong_base_branch:${baseRef ?? "unknown"}`,
                );
                await createParseFailureComment(
                  `Hodor ignored your \`/hodor review <Context>\` request because this PR targets \`${baseRef ?? "unknown"}\`.\n\nAllowed PR base branch(es): \`${allowedBase.join("`, `")}\`.\n\nFix: retest by commenting on a PR targeting an allowed base branch (or update \`HODOR_ALLOWED_BASE_BRANCH\`).`
                );
                return;
              }

            } catch (e) {
              core.setOutput("should_run", "false");
              core.setOutput("prompt", "");
              core.setOutput(
                "reason",
                "failed_to_resolve_pr_base_branch",
              );
              return;
            }

            const match = body.match(/^\/hodor(?:\s+review)?(?:\s+([\s\S]*))?$/i);
            const prompt = (match?.[1] || "").trim();
            core.setOutput("should_run", "true");
            core.setOutput("prompt", prompt);
            core.setOutput("reason", "accepted");

      - name: Acknowledge accepted command
        if: ${{ steps.parse.outputs.should_run == 'true' && github.run_attempt == 1 }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: "eyes"
            });

  review:
    if: ${{ needs.parse.outputs.should_run == 'true' && github.run_attempt == 1 }}
    needs: [parse]
    uses: ./.github/workflows/hodor-reusable-review.yml
    with:
      pr_number: ${{ github.event.issue.number }}
      prompt: ${{ needs.parse.outputs.prompt }}
      kb_enabled: ${{ vars.HODOR_KB_ENABLED || 'true' }}
      qdrant_url: ${{ vars.HODOR_QDRANT_URL }}
      kb_embedding_model: ${{ vars.HODOR_KB_EMBEDDING_MODEL }}
      kb_dedup_threshold: ${{ vars.HODOR_KB_DEDUP_THRESHOLD }}
      kb_extract_model: ${{ vars.HODOR_KB_EXTRACT_MODEL }}
      model: ${{ vars.HODOR_LLM_MODEL || 'openai/gpt-5' }}
      hodor_repo: ${{ vars.HODOR_SOURCE_REPO || 'KoinX-Tech/hodor' }}
    secrets: inherit
